esphome:
  name: azureforest-roomsensor-1
  friendly_name: AzureForest RoomSensor 1
  comment: "Azure Forest ESP32 HA Board V1.0 | AHT20 + LD2410C | Designed by Jack Omilanowicz"
  project:
    name: "Azure Forest.RoomSensor_ESP32"
    version: "1.0.7"
  # Larger app partition – needed for BLE + HTTP + update components
  # min_spiffs: 1.93MB app (vs default 1.79MB), keeps both OTA slots, reduces unused SPIFFS
  platformio_options:
    board_build.partitions: min_spiffs.csv

  on_boot:
    priority: -100
    then:
      - delay: 2s
      - switch.turn_on: blue_led   # solid on while connecting to WiFi / HA

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Home Assistant native API
api:
  encryption:
    key: !secret api_encryption_key

# OTA updates
ota:
  - platform: esphome
    password: !secret ota_password
  - platform: http_request

# WiFi
wifi:
  # AFIOT (hidden network)
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      hidden: true
  # Fallback hotspot if all networks fail – also used by Improv provisioning
  ap:
    ssid: "RoomSensor Fallback"
    password: !secret ap_password
  on_connect:
    then:
      - repeat:
          count: 3
          then:
            - switch.turn_off: blue_led
            - delay: 150ms
            - switch.turn_on: blue_led
            - delay: 150ms
      - switch.turn_off: blue_led   # off = connected to WiFi / HA

captive_portal:

# HTTP client (used for firmware update checks)
http_request:
  verify_ssl: false

# ──────────────────────────────────────────────
# Easy provisioning (first-time setup)
# ──────────────────────────────────────────────

# Provision WiFi via USB serial (works with HA Improv flow)
improv_serial:

# Provision WiFi via BLE on first boot (HA detects unconfigured device automatically)
esp32_improv:
  authorizer: none

# Allow HA's ESPHome dashboard to auto-import this config during device adoption
dashboard_import:
  package_import_url: github://jkomilanowicz-lab/RoomSensor_ESP32/roomsensor_esp32.yaml@main

# I2C bus – AHT20 Temperature & Humidity Sensor
# SDA → GPIO21, SCL → GPIO22
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 50000
  id: bus_i2c

# UART – LD2410C Human Presence Radar
# ESP TX (GPIO17) → LD2410C RX
# ESP RX (GPIO16) ← LD2410C TX
# Baud: 256000 (LD2410C default)
uart:
  id: uart_ld2410
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

# LD2410C component
ld2410:
  uart_id: uart_ld2410

# ──────────────────────────────────────────────
# Sensors
# ──────────────────────────────────────────────
sensor:
  # AHT10 – Temperature & Humidity
  - platform: aht10
    variant: AHT20
    i2c_id: bus_i2c
    temperature:
      name: "Room Temperature"
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      filters:
        - lambda: return x + id(temp_offset_number).state;
    humidity:
      name: "Room Humidity"
      unit_of_measurement: "%"
      accuracy_decimals: 1
      filters:
        - lambda: return x + id(humidity_offset_number).state;
    update_interval: 30s

  # LD2410C – Distance & Energy readings
  - platform: ld2410
    moving_distance:
      name: "LD2410 Moving Distance"
      unit_of_measurement: "cm"
    still_distance:
      name: "LD2410 Still Distance"
      unit_of_measurement: "cm"
    moving_energy:
      name: "LD2410 Moving Energy"
    still_energy:
      name: "LD2410 Still Energy"
    detection_distance:
      name: "LD2410 Detection Distance"
      unit_of_measurement: "cm"
    # Engineering mode – per-gate energy (active when Engineering Mode switch is ON)
    g0:
      move_energy:
        name: "Gate 0 Move Energy"
      still_energy:
        name: "Gate 0 Still Energy"
    g1:
      move_energy:
        name: "Gate 1 Move Energy"
      still_energy:
        name: "Gate 1 Still Energy"
    g2:
      move_energy:
        name: "Gate 2 Move Energy"
      still_energy:
        name: "Gate 2 Still Energy"
    g3:
      move_energy:
        name: "Gate 3 Move Energy"
      still_energy:
        name: "Gate 3 Still Energy"
    g4:
      move_energy:
        name: "Gate 4 Move Energy"
      still_energy:
        name: "Gate 4 Still Energy"
    g5:
      move_energy:
        name: "Gate 5 Move Energy"
      still_energy:
        name: "Gate 5 Still Energy"
    g6:
      move_energy:
        name: "Gate 6 Move Energy"
      still_energy:
        name: "Gate 6 Still Energy"
    g7:
      move_energy:
        name: "Gate 7 Move Energy"
      still_energy:
        name: "Gate 7 Still Energy"
    g8:
      move_energy:
        name: "Gate 8 Move Energy"
      still_energy:
        name: "Gate 8 Still Energy"

  # Wi-Fi signal strength
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s


# ──────────────────────────────────────────────
# Binary Sensors
# ──────────────────────────────────────────────
binary_sensor:
  # LD2410C – Software presence (via UART)
  - platform: ld2410
    has_target:
      name: "Presence Detected"
      device_class: occupancy
    has_moving_target:
      name: "Moving Target"
      device_class: motion
    has_still_target:
      name: "Still Target"
      device_class: occupancy

  # LD2410C – Hardware OUT pin (GPIO16) – simple high/low presence output
  - platform: gpio
    pin:
      number: GPIO4
      mode:
        input: true
        pulldown: true
    name: "Presence OUT Pin"
    device_class: occupancy

# ──────────────────────────────────────────────
# Bluetooth Proxy
# ──────────────────────────────────────────────
esp32_ble_tracker:
  scan_parameters:
    interval: 320ms   # scan every 320ms
    window: 30ms      # but only for 30ms each time (~9% duty cycle, leaves WiFi room to breathe)
    active: true

bluetooth_proxy:
  active: true

# ──────────────────────────────────────────────
# Firmware Update Check
# ──────────────────────────────────────────────
update:
  - platform: http_request
    name: "Firmware Update"
    source: https://raw.githubusercontent.com/jkomilanowicz-lab/RoomSensor_ESP32/main/version.json
    update_interval: 6h

# ──────────────────────────────────────────────
# Buttons
# ──────────────────────────────────────────────
button:
  - platform: restart
    name: "Restart"
    icon: "mdi:restart"
    entity_category: config

# ──────────────────────────────────────────────
# Switches
# ──────────────────────────────────────────────
switch:
  # Onboard blue LED (GPIO2) – toggle from HA
  # Red LED is hardwired to power rail, not GPIO controlled
  - platform: gpio
    pin: GPIO2
    name: "Blue LED"
    id: blue_led
    icon: "mdi:led-on"
    restore_mode: ALWAYS_OFF

  # LD2410C switches
  - platform: ld2410
    engineering_mode:
      name: "Engineering Mode"
      entity_category: config
    bluetooth:
      name: "LD2410 Bluetooth"
      entity_category: config

# ──────────────────────────────────────────────
# AHT20 Calibration Controls
# ──────────────────────────────────────────────
number:
  # Temperature offset – compensates for ESP32 self-heating (default -7.0°C)
  - platform: template
    name: "Temperature Offset"
    id: temp_offset_number
    min_value: -20.0
    max_value: 20.0
    step: 0.1
    unit_of_measurement: "°C"
    icon: "mdi:thermometer-lines"
    entity_category: config
    restore_value: true
    initial_value: -7.0
    optimistic: true

  # Humidity offset – fine-tune with a reference hygrometer (default 0%)
  - platform: template
    name: "Humidity Offset"
    id: humidity_offset_number
    min_value: -20.0
    max_value: 20.0
    step: 0.5
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    entity_category: config
    restore_value: true
    initial_value: 0.0
    optimistic: true

# ──────────────────────────────────────────────
# LD2410C Calibration Controls
# ──────────────────────────────────────────────
  - platform: ld2410
    timeout:
      name: "Detection Timeout"
      entity_category: config
    max_move_distance_gate:
      name: "Max Move Distance Gate"
      entity_category: config
    max_still_distance_gate:
      name: "Max Still Distance Gate"
      entity_category: config
    g0:
      move_threshold:
        name: "Gate 0 Move Sensitivity"
      still_threshold:
        name: "Gate 0 Still Sensitivity"
    g1:
      move_threshold:
        name: "Gate 1 Move Sensitivity"
      still_threshold:
        name: "Gate 1 Still Sensitivity"
    g2:
      move_threshold:
        name: "Gate 2 Move Sensitivity"
      still_threshold:
        name: "Gate 2 Still Sensitivity"
    g3:
      move_threshold:
        name: "Gate 3 Move Sensitivity"
      still_threshold:
        name: "Gate 3 Still Sensitivity"
    g4:
      move_threshold:
        name: "Gate 4 Move Sensitivity"
      still_threshold:
        name: "Gate 4 Still Sensitivity"
    g5:
      move_threshold:
        name: "Gate 5 Move Sensitivity"
      still_threshold:
        name: "Gate 5 Still Sensitivity"
    g6:
      move_threshold:
        name: "Gate 6 Move Sensitivity"
      still_threshold:
        name: "Gate 6 Still Sensitivity"
    g7:
      move_threshold:
        name: "Gate 7 Move Sensitivity"
      still_threshold:
        name: "Gate 7 Still Sensitivity"
    g8:
      move_threshold:
        name: "Gate 8 Move Sensitivity"
      still_threshold:
        name: "Gate 8 Still Sensitivity"

# ──────────────────────────────────────────────
# LD2410C Select Controls
# ──────────────────────────────────────────────
select:
  - platform: ld2410
    distance_resolution:
      name: "Distance Resolution"
      entity_category: config
    baud_rate:
      name: "Baud Rate"
      entity_category: config
    out_pin_level:
      name: "OUT Pin Level"
      entity_category: config

# ──────────────────────────────────────────────
# Text Sensors
# ──────────────────────────────────────────────
text_sensor:
  - platform: ld2410
    version:
      name: "LD2410 Firmware Version"

  - platform: uptime
    name: "Uptime"

  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

  # Board identity
  - platform: template
    name: "Designed By"
    lambda: return {"Jack Omilanowicz"};
    icon: "mdi:account-wrench"
    entity_category: diagnostic

  - platform: template
    name: "Board"
    lambda: return {"Azure Forest ESP32 HA Board V1.0"};
    icon: "mdi:developer-board"
    entity_category: diagnostic
